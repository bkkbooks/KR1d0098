body:
  text: 祭典范汪凡夫婦者皆同席貴賤同也兄弟同席謂未婚也杜佑通典卷四十八引范汪祀禮廢小宗昭穆不亂廢大宗昭穆亂矣先生所以重大宗也豈得不廢小宗以繼大宗乎漢家求三代之後弗得此不立大宗之過也豈不以宗子廢絶圖籍莫紀若常有宗主雖喪亂要有存理或可分在掌録或可藏之於名山設不盡在決不盡失且同姓百代不婚周道也而姓自變易何由得知一己不知或容有得婚者此大違先王之典而傷自然之理由此言之宗子之重於天下久矣汪子寧以為父母生之續莫大焉三千之罪無後為重夫立大宗所以論序昭穆彌綸百代繫之以姓而弗別綴之以食而弗殊禮盡於此誠重矣方之祖考於斯為薄若今捨重適輕違親就疏則是生敬養沒不敬享生人之本不盡孝子之事靡終非所以通人子之情為經代之典夫嫡子存則奉養有主嫡子亡則蒸嘗靡寄是以支子有出後之義而無廢嫡之文故嫡子不得後大宗但云以支子繼大宗則義已暢矣不應復云嫡子不得繼大宗此乃小宗不可絶之明文也若無大宗唯不得收族耳小宗之家各統昭穆何必亂乎汪又曰大宗者人之本也尊之統也人不可以無其本所以立大宗也上理祖禰尊尊之道著矣下理子孫親親之義明矣傍理昆弟天倫之理達矣存則合族以食序以昭穆導以德行別以禮義沒則禘祭太祖陳其親疏殤與無服莫不咸在此則孝子之事終矣立人之道竭矣小宗之家五代則遷安知始祖之所從出宗祀之所由來敬宗所以尊祖禰不亦重乎然要當以穆繼昭大宗不可以絶則支子常有繼祖是無父者矣通典卷九十六孟春祠用甘蔗太平御覽卷九百七十四夏薦下乳餅臛徐堅初學記卷二十六孟夏祭下甘脆用櫻桃枇杷太平御覽卷八百五十二引孟夏下甘脆又卷九百六十九引孟夏祭用櫻桃又卷九百七十一引孟夏祭用枇杷蓋一節以類分引今刪合下同仲夏薦角黍䬳杏酪太平御覽卷八百五十一引仲夏薦角黍䬳又卷八百五十八引仲夏薦杏酪孟秋之祭菱芡薦下雀瑞餅太平御覽卷九百七十五虞世南北堂書鈔卷一百四十六冬薦白環餅北堂書鈔卷一百四十六孟冬下祭水引祭用椑柿有芹葅不鹹菹初學記卷二十六太平御覽卷九百七十一
